name: UMAI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  umai-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dockerhub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull UMAI test runner image
        run: docker pull --platform linux/amd64 usemangoai/test-runner-dev:latest

      - name: Create api key file
        run: echo "${{ secrets.API_KEY }}" > test_data/pipeline_inputs/api_key.txt

      - name: Run UMAI tests
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v ${{ github.workspace }}/test_data:/umai_data \
            -e GENERATE_JUNIT_REPORT=true \
            usemangoai/test-runner-dev:latest

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: umai-test-results
          path: test_data/outputs/junit.xml
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.actor != 'nektos/act'
        with:
          files: test_data/outputs/junit.xml
          comment_title: UMAI Test Results
          check_name: UMAI Tests