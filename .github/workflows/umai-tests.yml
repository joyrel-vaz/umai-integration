name: UMAI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  umai-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dockerhub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull UMAI test runner image
        run: docker pull --platform linux/amd64 usemangoai/test-runner-dev:latest

      - name: Create api key file
        run: echo "${{ secrets.API_KEY }}" > umai_data/pipeline_inputs/api_key.txt

      - name: Run UMAI tests
        run: |
          mkdir -p umai_data/outputs && chmod 777 umai_data/outputs
          docker run --rm \
            --platform linux/amd64 \
            -v ${{ github.workspace }}/umai_data:/umai_data \
            -e GENERATE_JUNIT_REPORT=true \
            usemangoai/test-runner-dev:latest

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: umai-test-results
          path: umai_data/outputs/junit.xml
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: UMAI Test Results
          path: umai_data/outputs/junit.xml
          reporter: java-junit